<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Face Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }
    #status {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.55);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="status">Initializing camera…</div>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <!-- ml5.js pinned to 1 -->
  <script src="https://unpkg.com/ml5@1/dist/ml5.js"></script>

  <script>
    
    let bodyPose;
    let poses = [];
    let connections;

    let textX;
    let textY;
    let duration = 0;
    let count = 0;
    let poesry =["I see you all in radiant color", 
    "lambent with light, you dance", 
    "the planes of you, sliding through electrons",
    "touching without touching, revolving",
    "what would it have been like to feel what you feel?"];


    new p5(function(p) {

      p.setup = async function() {
        statusEl = document.getElementById('status');
        const cnv = p.createCanvas(p.windowWidth, p.windowHeight);
        cnv.style('position', 'fixed');
        cnv.style('top', '0');
        cnv.style('left', '0');

        textX = p.random(10,p.width-200);
        textY = p.random(200,p.height-200);

        capture = p.createCapture(p.VIDEO);
        capture.size(p.windowWidth, p.windowHeight);
        capture.hide();

        bodyPose = await ml5.bodyPose();
        // Start detecting poses in the webcam video
        bodyPose.detectStart(capture, gotPoses);
        // Get the skeleton connection information
        connections = bodyPose.getSkeleton();
      };

      p.draw = function() {
        p.background(0);
        // Draw the skeleton connections
        for (let i = 0; i < poses.length; i++) {
            let pose = poses[i];
            for (let j = 0; j < connections.length; j++) {
            let pointAIndex = connections[j][0];
            let pointBIndex = connections[j][1];
            let pointA = pose.keypoints[pointAIndex];
            let pointB = pose.keypoints[pointBIndex];
            // Only draw a line if both points are confident enough
            if (pointA.confidence > 0.1 && pointB.confidence > 0.1) {
                p.stroke(255, 0, 0);
                p.strokeWeight(2);
                p.line(pointA.x, pointA.y, pointB.x, pointB.y);
            }
            }
        }

    // Draw all the tracked landmark points
        for (let i = 0; i < poses.length; i++) {
            let pose = poses[i];
            for (let j = 0; j < pose.keypoints.length; j++) {
            let keypoint = pose.keypoints[j];
            // Only draw a circle if the keypoint's confidence is bigger than 0.1
            if (keypoint.confidence > 0.1) {
                p.fill(0, 255, 0);
                p.noStroke();
                p.circle(keypoint.x, keypoint.y, 10);
            }
            }
        }
}

        // Callback function for when bodyPose outputs data
        function gotPoses(results) {
        // Save the output to the poses variable
        poses = results;
        }


      p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        capture.size(p.windowWidth, p.windowHeight);
      };
    });
  </script>
</body>
</html>
